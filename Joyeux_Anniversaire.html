<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 Joyeux Anniversaire Louise !</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #fce4ec 100%);
      font-family: Helvetica, Arial, sans-serif;
      padding: 2rem 1rem;
    }

    .deco-top {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 22px;
      letter-spacing: 4px;
    }

    .card-outer {
      width: 340px;
      border-radius: 24px;
      overflow: hidden;
      border: 2.5px solid #f48fb1;
      background: #fff0f5;
      box-shadow: 0 0 0 5px #fce4ec, 0 8px 30px rgba(244,143,177,0.3);
      position: relative;
    }

    .card-header {
      background: linear-gradient(135deg, #f8bbd0 0%, #f48fb1 100%);
      padding: 18px 20px 14px;
      text-align: center;
      position: relative;
    }

    .card-header .sticker-left {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 26px;
    }
    .card-header .sticker-right {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%); font-size: 26px;
    }

    .card-header h1 {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: #880e4f;
      margin: 0;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-header p {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 10px;
      color: #ad1457;
      margin: 4px 0 0;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .scratch-zone {
      position: relative;
      width: 340px;
      height: 270px;
      cursor: crosshair;
      overflow: hidden;
    }

    .reveal-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 100%);
      padding: 16px;
      gap: 8px;
    }

    .event-visual {
      width: 100%;
      height: 140px;
      background: #1a1a1a;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #f48fb1;
      overflow: hidden;
    }

    .event-box {
      text-align: center;
      color: #fff;
      font-family: Helvetica, Arial, sans-serif;
    }
    .event-box .az   { font-size: 9px;  color: #aaa; letter-spacing: 3px; margin-bottom: 2px; }
    .event-box .date { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: 2px; }
    .event-box .venue{ font-size: 8px;  color: #bbb; letter-spacing: 2px; margin: 3px 0; }
    .event-box .dj   { font-size: 30px; font-weight: 900; color: #fff; letter-spacing: 3px; }
    .event-box .time { font-size: 10px; color: #aaa; letter-spacing: 2px; margin-top: 3px; }

    .reveal-text {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: #880e4f;
      text-align: center;
      line-height: 1.6;
    }
    .reveal-text strong {
      display: block;
      color: #ad1457;
      font-size: 14px;
      font-weight: 900;
      margin-top: 4px;
    }

    canvas#scratchCanvas {
      position: absolute;
      inset: 0;
      width: 340px;
      height: 270px;
      touch-action: none;
    }

    .card-footer {
      background: #fce4ec;
      padding: 10px;
      text-align: center;
      border-top: 1.5px dashed #f48fb1;
      font-size: 20px;
      letter-spacing: 4px;
    }

    .hint {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 12px;
      color: #ad1457;
      text-align: center;
      margin-top: 12px;
      letter-spacing: 0.5px;
    }

    .progress-bar {
      width: 340px;
      height: 6px;
      background: #fce4ec;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
      border: 1px solid #f48fb1;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f48fb1, #e91e8c);
      border-radius: 3px;
      transition: width 0.2s;
      width: 0%;
    }

    .deco-bottom {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      font-size: 20px;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>

  <div class="deco-top">🌸 🎀 💕 🌸 🎀 💕 🌸</div>

  <div class="card-outer">
    <div class="card-header">
      <span class="sticker-left">🎂</span>
      <h1>Joyeux Anniversaire</h1>
      <p>✨ Carte surprise · Grattez pour révéler ✨</p>
      <span class="sticker-right">🎉</span>
    </div>

    <div class="scratch-zone" id="scratchZone">
      <div class="reveal-content">
        <div class="event-visual">
          <div class="event-box">
            <div class="az">[A–Z]</div>
            <div class="date">04.06.2026</div>
            <div class="venue">Kilomètre25 · Fight Club Techno</div>
            <div class="dj">DATSKO</div>
            <div class="time">23:00 — 06:00</div>
          </div>
        </div>
        <div class="reveal-text">
          Tu as reçu un billet pour voir
          <strong>🎊 Joyeux anniversaire ma petite Louise !!!!</strong>
        </div>
      </div>
      <canvas id="scratchCanvas" width="340" height="270"></canvas>
    </div>

    <div class="card-footer">🌷 🦋 🍭 🌈 💖 🌷 🦋 🍭</div>
  </div>

  <div class="hint" id="hint">👆 Grattez pour découvrir votre surprise !</div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="deco-bottom">💕 🎀 🌸 💕 🎀 🌸 💕</div>

  <script>
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d');
    const hint = document.getElementById('hint');
    const progressFill = document.getElementById('progressFill');

    const grad = ctx.createLinearGradient(0, 0, 340, 270);
    grad.addColorStop(0, '#f8bbd0');
    grad.addColorStop(0.5, '#f48fb1');
    grad.addColorStop(1, '#f06292');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 340, 270);

    for (let r = 0; r < 6; r++) {
      for (let c = 0; c < 8; c++) {
        ctx.fillStyle = r % 2 === c % 2 ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.04)';
        ctx.fillRect(c * 42, r * 45, 42, 45);
      }
    }

    for (let x = 15; x < 340; x += 22) {
      for (let y = 15; y < 270; y += 22) {
        ctx.beginPath();
        ctx.arc(x, y, 1.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.25)';
        ctx.fill();
      }
    }

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 30px Helvetica, Arial, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GRATTEZ ICI', 170, 110);

    ctx.font = '16px Helvetica, Arial, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('🌸  💕  🎀  💕  🌸', 170, 155);

    ctx.font = '11px Helvetica, Arial, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.fillText('pour révéler votre surprise', 170, 192);

    ctx.globalCompositeOperation = 'destination-out';

    let isDrawing = false;
    let revealed = false;
    const totalPx = 340 * 270;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = 340 / rect.width;
      const scaleY = 270 / rect.height;
      if (e.touches) {
        return {
          x: (e.touches[0].clientX - rect.left) * scaleX,
          y: (e.touches[0].clientY - rect.top) * scaleY
        };
      }
      return {
        x: (e.clientX - rect.left) * scaleX,
        y: (e.clientY - rect.top) * scaleY
      };
    }

    function scratch(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const pos = getPos(e);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, 24, 0, Math.PI * 2);
      ctx.fill();
      updateProgress();
    }

    function updateProgress() {
      if (revealed) return;
      const imgData = ctx.getImageData(0, 0, 340, 270);
      let transparent = 0;
      for (let i = 3; i < imgData.data.length; i += 4) {
        if (imgData.data[i] < 128) transparent++;
      }
      const pct = Math.min(100, Math.round((transparent / totalPx) * 100));
      progressFill.style.width = pct + '%';
      if (pct > 55 && !revealed) {
        revealed = true;
        canvas.style.opacity = '0';
        canvas.style.transition = 'opacity 0.9s ease';
        hint.textContent = '🎊 Surprise dévoilée ! Joyeux anniversaire Louise ! 🎂💕';
        progressFill.style.background = 'linear-gradient(90deg, #e91e8c, #f48fb1)';
      }
    }

    canvas.addEventListener('mousedown', e => { isDrawing = true; scratch(e); });
    canvas.addEventListener('mousemove', scratch);
    canvas.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('mouseleave', () => isDrawing = false);
    canvas.addEventListener('touchstart', e => { isDrawing = true; scratch(e); }, { passive: false });
    canvas.addEventListener('touchmove', scratch, { passive: false });
    canvas.addEventListener('touchend', () => isDrawing = false);
  </script>
</body>
</html>
